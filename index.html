<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Auditoria Cajeros</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f1}#root{min-height:100vh}.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;color:#1a6b3c}.spinner{width:40px;height:40px;border:4px solid #e6f4ec;border-top:4px solid #1a6b3c;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}#err{color:red;padding:20px;font-size:13px;white-space:pre-wrap;max-width:800px;margin:20px auto;background:#fde8e8;border-radius:10px;display:none}</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="Recharts.js"></script>
</head>
<body>
<div id="root"><div class="loading"><div class="spinner"></div><div>Cargando Auditoria Cajeros...</div></div></div>
<div id="err"></div>
<script>window.onerror=function(m,s,l){var e=document.getElementById('err');e.style.display='block';e.textContent='ERROR: '+m+'\nArchivo: '+s+'\nLinea: '+l;}</script>
<script src="App.js"></script>
</body></html>
